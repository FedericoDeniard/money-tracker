name: Ready to deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Fail if draft
        if: github.event.pull_request.draft == true
        run: |
          echo "::error::PR is still a draft. Mark it ready for review to deploy."
          exit 1
